name: "JFrog Integration Example"
on: push

env:
  JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
  JF_URL: ${{ vars.JF_URL }}

jobs:
  build:
     runs-on: ubuntu-latest
       
     steps:
       - name: Checkout
         uses: actions/checkout@v4

       - name: call action
         uses: ./.github/actions
         
       - name: Setup JFrog CLI
         uses: jfrog/setup-jfrog-cli@v4
         #env:  
         #  JF_URL: ${{ vars.JF_URL }}
         #  JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
         
       - name: uv install
         run: |
           curl -LsSf https://astral.sh/uv/install.sh | sh

       - name: uv login
         env:  
           JF_URL: ${{ vars.JF_URL }}
           JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}   
         run: |
           uv auth login ${JF_URL} --username tomas.miklusicak@cloudops.sk --password ${JF_ACCESS_TOKEN}
       
       - name: uv test
         env:  
           JF_URL: ${{ vars.JF_URL }}
           JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
         run: |
           curl -LsSf https://astral.sh/uv/install.sh | sh
           uv init abc
           cd abc
           uv add yamllint pandas
           
    
